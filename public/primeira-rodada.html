<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos da 1ª Rodada - Bolão Solar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #050505;
      background:
        linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px),
        radial-gradient(circle at 10% 10%, rgba(255, 45, 36, .12), transparent 32%),
        radial-gradient(circle at 90% 30%, rgba(33, 211, 202, .18), transparent 30%),
        #fffdf2;
      background-size: 32px 32px, 32px 32px, auto, auto, auto;
    }

    .topo {
      width: min(1120px, calc(100% - 24px));
      margin: 20px auto 14px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .voltar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 16px;
      border: 4px solid #050505;
      border-radius: 999px;
      background: #d6ff00;
      color: #050505;
      box-shadow: 5px 5px 0 #050505;
      font-size: 11px;
      font-weight: 1000;
      text-transform: uppercase;
      text-decoration: none;
    }

    .card {
      width: min(1120px, calc(100% - 24px));
      margin: 0 auto 28px;
      border: 4px solid #050505;
      border-radius: 30px;
      background: #ffffff;
      box-shadow: 8px 8px 0 #050505;
      overflow: hidden;
    }

    .header {
      padding: 20px;
      border-bottom: 4px solid #050505;
      background:
        radial-gradient(circle at 100% 0%, rgba(214,255,0,.45), transparent 30%),
        #21d3ca;
    }

    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border: 3px solid #050505;
      border-radius: 999px;
      background: #d6ff00;
      box-shadow: 3px 3px 0 #050505;
      font-size: 10px;
      font-weight: 1000;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: clamp(42px, 8vw, 92px);
      line-height: .82;
      letter-spacing: -3px;
      text-transform: uppercase;
    }

    .header p {
      max-width: 780px;
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 3px solid #050505;
      background: #fffdf2;
    }

    .filtro {
      min-height: 36px;
      padding: 8px 12px;
      border: 3px solid #050505;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 2px 2px 0 #050505;
      font-size: 10px;
      font-weight: 1000;
      text-transform: uppercase;
      cursor: pointer;
    }

    .filtro.ativo {
      background: #ff2d24;
      color: #ffffff;
    }

    .lista {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: #fffbea;
    }

    .jogo {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border: 3px solid #050505;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 4px 4px 0 #050505;
    }

    .time {
      display: grid;
      gap: 4px;
    }

    .time.away {
      text-align: right;
    }

    .time strong {
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 1000;
      line-height: .9;
      text-transform: uppercase;
    }

    .time small {
      font-size: 10px;
      font-weight: 900;
      opacity: .72;
    }

    .centro {
      display: grid;
      place-items: center;
      gap: 8px;
    }

    .hora {
      min-width: 78px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #050505;
      border-radius: 999px;
      background: #21d3ca;
      box-shadow: 3px 3px 0 #050505;
      font-size: 13px;
      font-weight: 1000;
    }

    .data {
      padding: 6px 10px;
      border: 2px solid #050505;
      border-radius: 999px;
      background: #d6ff00;
      font-size: 9px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .palpite {
      display: grid;
      gap: 8px;
      min-width: 176px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 6px;
    }

    .inputs input {
      width: 54px;
      height: 42px;
      border: 3px solid #050505;
      border-radius: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 1000;
      outline: none;
    }

    .salvar {
      min-height: 38px;
      border: 3px solid #050505;
      border-radius: 999px;
      background: #ff2d24;
      color: #ffffff;
      box-shadow: 3px 3px 0 #050505;
      font-size: 10px;
      font-weight: 1000;
      text-transform: uppercase;
      cursor: pointer;
    }

    .salvar.salvo {
      background: #d6ff00;
      color: #050505;
    }

    .estado {
      padding: 28px;
      text-align: center;
      font-weight: 1000;
    }

    @media (max-width: 860px) {
      .jogo {
        grid-template-columns: 1fr;
      }

      .time.away {
        text-align: left;
      }

      .centro {
        display: flex;
        justify-content: space-between;
      }

      .palpite {
        min-width: 0;
      }

      .inputs {
        justify-content: start;
        grid-template-columns: 54px auto 54px;
      }
    }
  </style>

<body>
  <div class="topo">
    <a class="voltar" href="/">← Voltar ao app</a>
    <span class="badge" id="contador">Carregando...</span>
  </div>

  <main class="card">
    <header class="header">
      <span class="badge">Bolão Solar</span>
      <h1>Jogos da 1ª Rodada</h1>
      <p>Escolha os placares dos jogos da primeira rodada. Os palpites são salvos no mesmo sistema do Bolão Solar.</p>
    </header>

    <div class="filtros" id="filtros"></div>
    <div class="lista" id="lista">
      <div class="estado">Carregando jogos...</div>
    </div>
  </main>

  <script>
    let jogos = [];
    let grupoAtivo = "TODOS";

    function formatarData(data) {
      const partes = String(data || "").split("-");
      return partes.length === 3 ? partes[2] + "/" + partes[1] + "/" + partes[0] : data;
    }

    function renderFiltros() {
      const filtros = document.getElementById("filtros");
      const grupos = Array.from(new Set(jogos.map(j => j.groupName || "Grupo"))).sort();
      const todos = ["TODOS", ...grupos];

      filtros.innerHTML = todos.map(grupo => `
        <button class="filtro ${grupo === grupoAtivo ? "ativo" : ""}" data-grupo="${grupo}">
          ${grupo === "TODOS" ? "Todos" : "Grupo " + grupo}
        </button>
      `).join("");
    }

    
function renderJogos() {
  const lista = document.getElementById("lista");
  const contador = document.getElementById("contador");

  const exibidos = grupoAtivo === "TODOS"
    ? jogos
    : jogos.filter(j => String(j.groupName) === String(grupoAtivo));

  contador.textContent = jogos.length + " jogos";

  if (!exibidos.length) {
    lista.innerHTML = '<div class="estado">Nenhum jogo encontrado.</div>';
    return;
  }

  lista.innerHTML = exibidos.map(jogo => `
    <article class="jogo jogo-layout-final">
      <div class="match-meta">
        <span class="hora">${jogo.kickoffTimeBR || "--:--"}</span>
        <span class="data">${formatarData(jogo.matchDate)}</span>
      </div>

      <div class="match-row">
        <div class="time team-home">
          <strong>${jogo.homeTeam || "-"}</strong>
          <small>Mandante · Grupo ${jogo.groupName || "-"}</small>
        </div>

        <div class="placar-centro">
          <div class="inputs">
            <input type="number" min="0" max="99" inputmode="numeric" id="home-${jogo.id}" />
            <span>x</span>
            <input type="number" min="0" max="99" inputmode="numeric" id="away-${jogo.id}" />
          </div>
        </div>

        <div class="time team-away away">
          <strong>${jogo.awayTeam || "-"}</strong>
          <small>Visitante · Jogo ${jogo.id}</small>
        </div>
      </div>

      <button class="salvar" data-save="${jogo.id}">Salvar palpite</button>
    </article>
  `).join("");
}

async function carregarJogos() {
      try {
        const response = await fetch("/api/first-round-matches", {
          credentials: "include",
          cache: "no-store"
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || "Erro ao carregar jogos.");
        }

        jogos = Array.isArray(data.matches) ? data.matches : [];

        renderFiltros();
        renderJogos();
      } catch (error) {
        document.getElementById("lista").innerHTML =
          '<div class="estado">Erro ao carregar jogos da 1ª rodada.</div>';
      }
    }

    async function salvarPalpite(matchId, botao) {
      const home = Number(document.getElementById("home-" + matchId).value);
      const away = Number(document.getElementById("away-" + matchId).value);

      if (!Number.isInteger(home) || !Number.isInteger(away) || home < 0 || away < 0 || home > 99 || away > 99) {
        alert("Informe um placar válido.");
        return;
      }

      try {
        botao.disabled = true;
        botao.textContent = "Salvando...";

        const body = new URLSearchParams({
          matchId,
          homeScore: String(home),
          awayScore: String(away)
        });

        const response = await fetch("/predictions", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || "Erro ao salvar palpite.");
        }

        botao.classList.add("salvo");
        botao.textContent = "Palpite salvo";
      } catch (error) {
        alert(error.message || "Erro ao salvar palpite.");
        botao.textContent = "Salvar palpite";
      } finally {
        botao.disabled = false;
      }
    }

    document.addEventListener("click", (event) => {
      const filtro = event.target.closest("[data-grupo]");
      if (filtro) {
        grupoAtivo = filtro.dataset.grupo;
        renderFiltros();
        renderJogos();
        return;
      }

      const save = event.target.closest("[data-save]");
      if (save) {
        salvarPalpite(save.dataset.save, save);
      }
    });

    carregarJogos();
  </script>
